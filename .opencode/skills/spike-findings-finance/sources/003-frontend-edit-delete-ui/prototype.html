<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceFlow — Edit/Delete Transactions Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        slate: { 950: '#0f172a', 900: '#1e293b', 800: '#334155', 700: '#475569', 600: '#64748b', 500: '#94a3b8', 400: '#94a3b8', 300: '#cbd5e1', 200: '#e2e8f0', 100: '#f1f5f9' },
        blue: { 950: '#172554', 900: '#1e3a5f', 800: '#1e40af', 600: '#2563eb', 500: '#3b82f6', 400: '#60a5fa' },
        red: { 950: '#450a0a', 900: '#7f1d1d', 800: '#991b1b', 500: '#ef4444', 400: '#f87171', 300: '#fca5a5' },
        green: { 400: '#4ade80' },
        yellow: { 400: '#facc15', 800: '#854d0e', 300: '#fde047' }
      }
    }
  }
}
</script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
  .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
</style>
</head>
<body>
<div class="min-h-screen flex flex-col">
  <!-- Header -->
  <header class="border-b border-slate-900 bg-slate-950/60 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center space-x-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">F</div>
      <span class="text-lg font-semibold tracking-tight">Finance<span class="text-blue-500">Flow</span></span>
    </div>
  </header>

  <main class="flex-grow px-6 py-12 max-w-6xl mx-auto w-full">
    <div class="space-y-6">
      <div>
        <h2 class="text-2xl font-semibold text-slate-100">Czerwiec 2026</h2>
        <p class="text-slate-400 text-sm">Szczegóły przepływów dla wybranego miesiąca</p>
      </div>

      <!-- Transaction Table -->
      <div class="overflow-x-auto rounded-xl border border-slate-800 bg-slate-900/40 backdrop-blur-xl">
        <table class="w-full text-sm text-left border-collapse" id="txTable">
          <thead class="bg-slate-900 text-slate-400 uppercase text-xs font-semibold">
            <tr>
              <th class="px-6 py-4 text-left">Data</th>
              <th class="px-6 py-4 text-left">Kategoria</th>
              <th class="px-6 py-4 text-left">Opis</th>
              <th class="px-6 py-4 text-right">Kwota</th>
              <th class="px-6 py-4 text-center w-24">Akcje</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-800 text-slate-300" id="txBody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div id="editModal" class="fixed inset-0 z-50 flex items-center justify-center hidden modal-overlay">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-lg mx-4 shadow-2xl">
    <h3 class="text-lg font-semibold text-slate-100 mb-4">Edytuj transakcję</h3>
    <form id="editForm" class="space-y-4">
      <input type="hidden" id="editId">
      <div>
        <label class="block text-sm text-slate-400 mb-1">Data</label>
        <input type="date" id="editDate" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Typ</label>
        <select id="editType" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-blue-500">
          <option value="expense">Wydatek</option>
          <option value="income">Przychód</option>
          <option value="transfer">Przelew</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Kwota</label>
        <input type="number" step="0.01" id="editAmount" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Opis</label>
        <input type="text" id="editDescription" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-blue-500">
      </div>
      <div>
        <label class="block text-sm text-slate-400 mb-1">Kategoria</label>
        <select id="editCategory" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 text-sm focus:outline-none focus:border-blue-500">
          <option value="">—</option>
          <option value="spozywcze">Spożywcze</option>
          <option value="mieszkanie">Mieszkanie</option>
          <option value="transport">Transport</option>
          <option value="rozrywka">Rozrywka</option>
          <option value="biuro">Biuro</option>
        </select>
      </div>
      <div class="flex justify-end space-x-3 pt-2">
        <button type="button" onclick="closeEditModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-200 bg-slate-800 hover:bg-slate-700 transition-colors">Anuluj</button>
        <button type="submit" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-500 transition-colors">Zapisz</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center hidden modal-overlay">
  <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
    <h3 class="text-lg font-semibold text-slate-100 mb-2">Usuń transakcję</h3>
    <p class="text-slate-400 text-sm mb-6">Czy na pewno chcesz usunąć tę transakcję? Tej operacji nie można cofnąć.</p>
    <div class="flex justify-end space-x-3">
      <button onclick="closeDeleteModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-200 bg-slate-800 hover:bg-slate-700 transition-colors">Anuluj</button>
      <button id="confirmDeleteBtn" class="px-4 py-2 rounded-lg text-sm font-medium text-white bg-red-600 hover:bg-red-500 transition-colors">Usuń</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden bg-slate-800 border border-slate-700 rounded-xl px-5 py-3 shadow-xl text-sm text-slate-200"></div>

<script>
const mockData = [
  { id: '1', date: '2026-06-01', type: 'expense', amount: 15.00, description: 'ZABKA Z0685 K.2', category: 'spozywcze', category_label: 'Spożywcze' },
  { id: '2', date: '2026-06-02', type: 'expense', amount: 246.00, description: 'P4 sp. z o.o. - telefon', category: 'biuro', category_label: 'Biuro' },
  { id: '3', date: '2026-06-03', type: 'income', amount: 8500.00, description: 'Wynagrodzenie', category: null, category_label: null },
  { id: '4', date: '2026-06-05', type: 'expense', amount: 3200.00, description: 'Czynsz za mieszkanie', category: 'mieszkanie', category_label: 'Mieszkanie' },
  { id: '5', date: '2026-06-10', type: 'transfer', amount: 2000.00, description: 'Wplata wlasna', category: null, category_label: null },
  { id: '6', date: '2026-06-15', type: 'expense', amount: 89.99, description: 'Netflix subskrypcja', category: 'rozrywka', category_label: 'Rozrywka' },
];

let deleteTargetId = null;

function renderTable() {
  const tbody = document.getElementById('txBody');
  tbody.innerHTML = mockData.map(tx => {
    let amountColor = 'text-slate-300';
    let sign = '';
    if (tx.type === 'income') { amountColor = 'text-green-400'; sign = '+'; }
    else if (tx.type === 'expense') { amountColor = 'text-red-400'; sign = '-'; }
    else if (tx.type === 'transfer') { amountColor = 'text-yellow-400'; }

    return `<tr class="hover:bg-slate-900/50 transition-colors group">
      <td class="px-6 py-4 whitespace-nowrap font-mono text-xs">${tx.date}</td>
      <td class="px-6 py-4 text-slate-200">${tx.category_label || '—'}</td>
      <td class="px-6 py-4">${tx.description || '—'}</td>
      <td class="px-6 py-4 text-right font-mono font-medium ${amountColor}">${sign}${tx.amount.toFixed(2)}</td>
      <td class="px-6 py-4 text-center">
        <div class="flex items-center justify-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
          <button onclick="openEditModal('${tx.id}')" class="p-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-blue-400 transition-all" title="Edytuj">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button onclick="openDeleteModal('${tx.id}')" class="p-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-red-400 transition-all" title="Usuń">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openEditModal(id) {
  const tx = mockData.find(t => t.id === id);
  if (!tx) return;
  document.getElementById('editId').value = id;
  document.getElementById('editDate').value = tx.date;
  document.getElementById('editType').value = tx.type;
  document.getElementById('editAmount').value = tx.amount;
  document.getElementById('editDescription').value = tx.description;
  document.getElementById('editCategory').value = tx.category || '';
  document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal() {
  document.getElementById('editModal').classList.add('hidden');
}

function openDeleteModal(id) {
  deleteTargetId = id;
  document.getElementById('deleteModal').classList.remove('hidden');
}

function closeDeleteModal() {
  deleteTargetId = null;
  document.getElementById('deleteModal').classList.add('hidden');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

// Edit form submit
document.getElementById('editForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const tx = mockData.find(t => t.id === id);
  if (!tx) return;

  tx.date = document.getElementById('editDate').value;
  tx.type = document.getElementById('editType').value;
  tx.amount = parseFloat(document.getElementById('editAmount').value);
  tx.description = document.getElementById('editDescription').value;
  const catVal = document.getElementById('editCategory').value;
  tx.category = catVal || null;
  const catLabels = { 'spozywcze': 'Spożywcze', 'mieszkanie': 'Mieszkanie', 'transport': 'Transport', 'rozrywka': 'Rozrywka', 'biuro': 'Biuro' };
  tx.category_label = catVal ? catLabels[catVal] : null;

  renderTable();
  closeEditModal();
  showToast('Transakcja zaktualizowana (symulacja)');
});

// Delete confirm
document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
  if (!deleteTargetId) return;
  const idx = mockData.findIndex(t => t.id === deleteTargetId);
  if (idx === -1) return;
  mockData.splice(idx, 1);
  renderTable();
  closeDeleteModal();
  showToast('Transakcja usunięta (symulacja)');
});

// Init
renderTable();
</script>
</body>
</html>

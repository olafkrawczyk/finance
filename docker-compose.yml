services:
  db:
    image: ghcr.io/pgmq/pg18-pgmq:v1.10.0
    container_name: finance-postgres
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: finance-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env.production:/app/.env.production:ro
    restart: unless-stopped

volumes:
  pgdata:
